name: Build Source2Roblox

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Source2Roblox
        uses: actions/checkout@v4
        with:
          path: Source2Roblox

      - name: Checkout Roblox-File-Format
        uses: actions/checkout@v4
        with:
          repository: MaximumADHD/Roblox-File-Format
          path: Roblox-File-Format

      - name: Checkout ValveKeyValue
        uses: actions/checkout@v4
        with:
          repository: MaximumADHD/ValveKeyValue
          path: ValveKeyValue

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1

      - name: Restore NuGet for Roblox-File-Format
        run: nuget restore Roblox-File-Format/RobloxFileFormat.csproj -SolutionDirectory Roblox-File-Format

      - name: Restore NuGet for Source2Roblox
        run: nuget restore Source2Roblox/Source2Roblox.sln

      - name: Build
        run: msbuild Source2Roblox/Source2Roblox.sln /p:Configuration=Release /p:PlatformTarget=x64

      - name: Copy all dlls to output
        run: |
          Get-ChildItem -Path "Roblox-File-Format\bin\Release" -Filter "*.dll" | Copy-Item -Destination "Source2Roblox\bin\Release\"
          Get-ChildItem -Path "Roblox-File-Format\packages" -Recurse -Filter "*.dll" | Where-Object { $_.FullName -match "net4" -or $_.FullName -match "net45" -or $_.FullName -match "net47" } | Copy-Item -Destination "Source2Roblox\bin\Release\"

      - name: List output files
        run: Get-ChildItem -Path "Source2Roblox\bin\Release\" | Select-Object Name

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Source2Roblox
          path: Source2Roblox/bin/Release/
